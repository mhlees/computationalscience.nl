<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%" style="background: radial-gradient(circle at center, #061e26 0%, #020617 100%); overflow: hidden;">
  <defs>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur1" />
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur2" />
      <feMerge>
        <feMergeNode in="blur2" />
        <feMergeNode in="blur1" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <style>
    .grid-line {
      stroke: #00e5ff;
      stroke-width: 1.2; 
      opacity: 0.35;
    }

    .node {
      filter: url(#neon-glow);
      /* Color pulse only! No scaling, so they never detach from the lines */
      animation: colorPulse 3s infinite alternate ease-in-out;
    }

    /* Staggered CSS color pulses for organic feel */
    .node:nth-child(2n) { animation-duration: 4.1s; animation-delay: 0.3s; fill: #00ffa3; }
    .node:nth-child(3n) { animation-duration: 2.7s; animation-delay: 1.1s; fill: #00e5ff; }
    .node:nth-child(5n) { animation-duration: 5.2s; animation-delay: 0.7s; fill: #b9ffea; }
    .node:nth-child(7n) { animation-duration: 3.8s; animation-delay: 1.5s; fill: #00a2ff; }

    @keyframes colorPulse {
      0% { opacity: 0.2; fill: #00e5ff; }
      100% { opacity: 1; fill: #ffffff; }
    }
    
    /* Using absolute 0px 0px origin ensures perfect centering across all browsers */
    .mesh-cam {
      transform-origin: 0px 0px;
      animation: camPan 15s infinite alternate ease-in-out;
    }
    @keyframes camPan {
      0% { transform: translate(400px, 300px) scale(3.5, 1.5) rotate(45deg); }
      100% { transform: translate(400px, 320px) scale(3.7, 1.6) rotate(43deg); }
    }
  </style>

