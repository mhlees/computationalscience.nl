      <line x1="-75" x2="-25" y1="0" y2="0"><animate attributeName="y1" values="-125;-105;-145;-125" dur="4.3s" repeatCount="indefinite"/><animate attributeName="y2" values="-125;-140;-110;-125" dur="5.5s" repeatCount="indefinite"/></line>
